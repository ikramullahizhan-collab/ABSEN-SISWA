<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi RFID NFC</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f3f4f6;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #10b981;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 20px;
        }
        .btn:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        #status {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        #log {
            margin-top: 10px;
            font-size: 14px;
            color: #6b7280;
        }

        #profileContainer {
            margin-top: 25px;
            display: none; 
            background-color: #f0fdf4;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #bbf7d0;
            animation: fadeIn 0.5s ease-in-out;
            transition: opacity 0.3s ease; 
        }
        
        /* Desain Keterangan Status di Atas Foto (Hanya Teks Berwarna) */
        #attendanceStatusText {
            display: none; /* Sembunyikan secara bawaan (saat absen pertama) */
            font-size: 22px;
            font-weight: 900; /* Extra tebal agar jelas terbaca */
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #studentPhoto {
            width: 150px;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            border: 3px solid #10b981;
            margin-bottom: 15px;
            background-color: #e5e7eb;
        }
        .info-label {
            font-size: 14px;
            color: #6b7280;
            margin: 4px 0 0 0;
        }
        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #111827;
            margin: 0 0 10px 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>E-Absensi Siswa (NFC)</h2>
    <p style="color: #4b5563; margin-bottom: 25px;">Aktifkan alat pemindai bawah ini, lalu siswa cukup menempelkan kartu untuk melakukan absensi secara mandiri.</p>
    
    <button id="scanButton" class="btn">Aktifkan Sensor Absensi</button>
    
    <div id="status" style="color: #4b5563;">Status: Mesin Absen Mati</div>
    <div id="log">---</div>
    
    <div id="profileContainer">
        <div id="attendanceStatusText">-</div>
        
        <img id="studentPhoto" src="" alt="Foto Siswa">
        
        <p class="info-label">Nama Siswa:</p>
        <p id="studentName" class="info-value">-</p>
        
        <p class="info-label">Kelas:</p>
        <p id="studentKelas" class="info-value">-</p>
    </div>

    <a href="pengaturan.html" style="display: block; margin-top: 30px; text-decoration: none; color: #9ca3af; font-size: 14px;">
        ⚙️ Pengaturan Admin
    </a>
</div> 
    
<script>
    const scanButton = document.getElementById("scanButton");
    const statusDiv = document.getElementById("status");
    const logDiv = document.getElementById("log");
    const profileContainer = document.getElementById("profileContainer");
    const attendanceStatusText = document.getElementById("attendanceStatusText");
    const studentPhoto = document.getElementById("studentPhoto");
    const studentName = document.getElementById("studentName");
    const studentKelas = document.getElementById("studentKelas");

    // PASTIKAN URL WEB APP INI SUDAH BENAR
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2DsW6Kk7H2bWTLJSs8e2p_1USfv6T_DWT2NfBUy7KKVHSPv1TnqoWcW4Su-Jh7qE6mw/exec";

    let ndef = null;
    let isProcessing = false;

    scanButton.addEventListener("click", async () => {
        if (!("NDEFReader" in window)) {
            statusDiv.innerText = "Error: Browser HP tidak mendukung Web NFC.";
            statusDiv.style.color = "#dc2626";
            return;
        }

        try {
            statusDiv.innerText = "Status: Memulai sensor...";
            ndef = new NDEFReader();
            await ndef.scan();
            
            statusDiv.innerText = "Status: Standby. Silakan Tempelkan Kartu...";
            statusDiv.style.color = "#d97706";
            scanButton.disabled = true; 
            scanButton.innerText = "Mesin Absen Aktif";

            ndef.addEventListener("readingerror", () => {
                if (!isProcessing) {
                    logDiv.innerText = "Gagal membaca kartu. Tempelkan posisi yang pas.";
                }
            });

            ndef.addEventListener("reading", async ({ serialNumber }) => {
                if (isProcessing) return; 
                isProcessing = true; 
                
                const uid = serialNumber.replace(/:/g, "").toUpperCase();
                logDiv.innerText = "Membaca ID Kartu: " + uid;
                statusDiv.innerText = "Status: Mencari data & mencatat absen...";
                statusDiv.style.color = "#2563eb"; 
                
                if (profileContainer.style.display === "block") {
                    profileContainer.style.opacity = "0.5";
                }

                try {
                    const response = await fetch(`${APPS_SCRIPT_URL}?uid=${uid}`);
                    const data = await response.json();
                    
                    profileContainer.style.opacity = "1";
                    
                    if (data.status === "success" || data.status === "already") {
                        
                        studentName.innerText = data.nama;
                        studentKelas.innerText = data.kelas;
                        
                        if (data.foto && data.foto.trim() !== "") {
                            studentPhoto.src = "foto/" + data.foto;
                        } else {
                            studentPhoto.src = "https://via.placeholder.com/150x180?text=Tanpa+Foto"; 
                        }
                        
                        studentPhoto.onerror = function() {
                            this.src = "https://via.placeholder.com/150x180?text=Foto+Tidak+Ditemukan";
                        };
                        
                        profileContainer.style.display = "block";

                        // 1. JIKA BARU ABSEN PERTAMA KALI HARI INI
                        if (data.status === "success") {
                            attendanceStatusText.style.display = "none"; // Sembunyikan keterangan di atas foto
                            
                            statusDiv.innerText = "Status: " + data.message;
                            statusDiv.style.color = "#16a34a"; // Pesan sistem warna hijau
                            
                            profileContainer.style.backgroundColor = "#f0fdf4";
                            profileContainer.style.borderColor = "#bbf7d0";
                            studentPhoto.style.borderColor = "#10b981";
                        } 
                        // 2. JIKA CEK KARTU (SUDAH ABSEN SEBELUMNYA)
                        else {
                            attendanceStatusText.innerText = data.statusAbsen; 
                            attendanceStatusText.style.display = "block"; // Munculkan teks keterangan
                            
                            // Logika Pewarnaan Teks
                            let statusCek = data.statusAbsen.toUpperCase();
                            if (statusCek.includes("MASUK")) {
                                attendanceStatusText.style.color = "#16a34a"; // Hijau
                            } else if (statusCek.includes("TERLAMBAT")) {
                                attendanceStatusText.style.color = "#dc2626"; // Merah
                            } else if (statusCek.includes("PULANG")) {
                                attendanceStatusText.style.color = "#2563eb"; // Biru
                            } else {
                                attendanceStatusText.style.color = "#d97706"; // Warna fallback (Oranye)
                            }
                            
                            statusDiv.innerText = "Peringatan: " + data.message;
                            statusDiv.style.color = "#d97706";
                            
                            // Ubah bingkai box agak kekuningan menandakan ini peringatan (sudah absen)
                            profileContainer.style.backgroundColor = "#fffbeb"; 
                            profileContainer.style.borderColor = "#fef3c7";
                            studentPhoto.style.borderColor = "#d97706";
                        }

                    } else {
                        // KARTU TIDAK DIKENAL
                        statusDiv.innerText = "Status: " + data.message;
                        statusDiv.style.color = "#dc2626"; 
                        
                        attendanceStatusText.innerText = "DITOLAK";
                        attendanceStatusText.style.display = "block";
                        attendanceStatusText.style.color = "#dc2626"; // Merah
                        
                        studentName.innerText = "KARTU TIDAK DIKENAL";
                        studentKelas.innerText = "Belum Terdaftar";
                        studentPhoto.src = "https://via.placeholder.com/150x180?text=Error";
                        
                        profileContainer.style.display = "block";
                        profileContainer.style.backgroundColor = "#fef2f2";
                        profileContainer.style.borderColor = "#fecaca";
                        studentPhoto.style.borderColor = "#dc2626";
                    }

                } catch (err) {
                    profileContainer.style.opacity = "1";
                    statusDiv.innerText = "Status: Server tidak merespon.";
                    statusDiv.style.color = "#dc2626";
                    logDiv.innerText = err.message;
                }

                setTimeout(() => {
                    statusDiv.innerText = "Status: Standby. Silakan Tempelkan Kartu Berikutnya...";
                    if(statusDiv.style.color !== "rgb(220, 38, 38)") { 
                        statusDiv.style.color = "#d97706";
                    }
                    isProcessing = false; 
                }, 3000);
            });

        } catch (error) {
            statusDiv.innerText = "Error: Gagal mengaktifkan sensor NFC.";
            statusDiv.style.color = "#dc2626";
            console.error(error);
        }
    });
</script>

</body>
</html>

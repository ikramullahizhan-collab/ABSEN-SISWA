<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesin Absensi QR & NFC</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        /* Reset & Layout Dasar dengan dvh */
        html, body {
            margin: 0; padding: 0; 
            height: 100%; 
            height: 100dvh; 
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; 
            position: relative;
        }

        /* BAGIAN ATAS: KAMERA QR CODE (20% Layar) */
        .camera-section {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 20%; 
            background-color: #000;
            display: none; 
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            z-index: 1;
        }
        #reader { width: 100%; height: 100%; position: relative; }
        
        /* PENTING: Ubah menjadi contain agar kamera tidak zoom-in memotong QR Code */
        #reader video {
            object-fit: contain !important; 
            width: 100% !important; 
            height: 100% !important;
        }

        /* BAGIAN BAWAH: PANEL UTAMA (80% Layar) */
        .info-section {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 80%; 
            background-color: white;
            border-radius: 25px 25px 0 0;
            padding: 25px 20px;
            box-sizing: border-box;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.15);
            overflow-y: auto;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 2;
        }
        
        .full-height {
            height: 100% !important;
            padding-top: 70px !important; 
            border-radius: 0px !important;
        }

        /* Teks & Tipografi */
        h2 { margin: 0 0 8px 0; color: #111827; font-size: 24px; }
        .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 25px; }
        
        /* MENU UTAMA */
        .menu-selection {
            display: flex; flex-direction: column; gap: 15px;
            max-width: 320px; margin: 30px auto 0 auto;
        }
        .btn-option {
            padding: 20px; font-size: 16px; font-weight: bold; color: white;
            border: none; border-radius: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .btn-option:active { transform: scale(0.98); }
        .btn-nfc { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .btn-qrc { background: linear-gradient(135deg, #10b981, #047857); }
        .btn-option span { font-size: 24px; }

        /* AREA PROSES ABSENSI */
        .scan-view { display: none; }
        
        #status { font-size: 16px; font-weight: bold; margin-top: 5px; color: #4b5563; }
        #log { font-size: 12px; color: #dc2626; margin-top: 5px; margin-bottom: 10px; font-style: italic; }

        /* Kotak Profil Siswa */
        #profileContainer {
            margin-top: 5px; display: none; background-color: #f0fdf4;
            padding: 15px; border-radius: 12px; border: 2px solid #bbf7d0;
            animation: fadeIn 0.4s ease-in-out; max-width: 350px; margin-left: auto; margin-right: auto;
        }
        #attendanceStatusText {
            display: none; font-size: 20px; font-weight: 900;
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        #studentPhoto {
            width: 100px; height: 130px; object-fit: cover; border-radius: 8px;
            border: 3px solid #10b981; margin-bottom: 5px; background-color: #e5e7eb;
        }
        .info-label { font-size: 12px; color: #6b7280; margin: 4px 0 0 0; }
        .info-value { font-size: 16px; font-weight: bold; color: #111827; margin: 0 0 5px 0; }
        
        /* Tombol Aksi */
        .btn-back {
            background-color: #ef4444; color: white; padding: 12px 20px; width: 100%; max-width: 350px;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            margin-top: 15px; font-size: 15px;
        }
        .link-admin {
            display: block; margin-top: 30px; text-decoration: none; 
            color: #9ca3af; font-size: 14px; font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="cameraSection" class="camera-section">
        <div id="reader"></div>
    </div>

    <div id="infoSection" class="info-section full-height">
        <h2>Sistem E-Absensi</h2>
        <p class="subtitle" id="mainSubtitle">Silakan pilih metode absensi siswa di bawah ini untuk memulai.</p>
        
        <div id="menuSelection" class="menu-selection">
            <button class="btn-option btn-nfc" onclick="activateMode('NFC')">
                <span>📟</span> KARTU RFID (NFC)
            </button>
            <button class="btn-option btn-qrc" onclick="activateMode('QR')">
                <span>🔍</span> SCAN QR CODE
            </button>
            <a href="pengaturan.html" class="link-admin">⚙️ Pengaturan Admin</a>
        </div>
        
        <div id="scanView" class="scan-view">
            <div id="status">Standby...</div>
            <div id="log"></div>
            
            <div id="profileContainer">
                <div id="attendanceStatusText">-</div>
                <img id="studentPhoto" src="" alt="Foto Siswa">
                <p class="info-label">Nama Siswa:</p>
                <p id="studentName" class="info-value">-</p>
                <p class="info-label">Kelas:</p>
                <p id="studentKelas" class="info-value">-</p>
            </div>

            <button class="btn-back" onclick="backToMenu()">❌ Batalkan / Kembali ke Menu</button>
        </div>
    </div>

<script>
    const cameraSection = document.getElementById("cameraSection");
    const infoSection = document.getElementById("infoSection");
    const menuSelection = document.getElementById("menuSelection");
    const scanView = document.getElementById("scanView");
    const mainSubtitle = document.getElementById("mainSubtitle");
    
    const statusDiv = document.getElementById("status");
    const logDiv = document.getElementById("log");
    const profileContainer = document.getElementById("profileContainer");
    const attendanceStatusText = document.getElementById("attendanceStatusText");
    const studentPhoto = document.getElementById("studentPhoto");
    const studentName = document.getElementById("studentName");
    const studentKelas = document.getElementById("studentKelas");

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2DsW6Kk7H2bWTLJSs8e2p_1USfv6T_DWT2NfBUy7KKVHSPv1TnqoWcW4Su-Jh7qE6mw/exec";

    let html5QrCode = null;
    let nfcAbortController = null; 
    let isProcessing = false; 
    let currentMode = "";

    function activateMode(mode) {
        currentMode = mode;
        logDiv.innerText = "";
        menuSelection.style.display = "none";
        scanView.style.display = "block";
        profileContainer.style.display = "none"; 

        if (mode === "QR") {
            infoSection.classList.remove("full-height"); 
            cameraSection.style.display = "flex"; 
            mainSubtitle.innerText = "Arahkan QR Code siswa agak jauh agar pas dalam kotak.";
            statusDiv.innerText = "Mengaktifkan kamera...";
            startCamera();
        } 
        else if (mode === "NFC") {
            cameraSection.style.display = "none";
            infoSection.classList.add("full-height"); 
            mainSubtitle.innerText = "Dekatkan kartu RFID siswa ke area sensor NFC di punggung HP Anda.";
            statusDiv.innerText = "Mengaktifkan Sensor NFC...";
            startNfc();
        }
    }

    function backToMenu() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().catch(err => console.log("Kamera gagal ditutup: ", err));
        }
        
        if (nfcAbortController) {
            nfcAbortController.abort(); 
            nfcAbortController = null;
        }
        
        currentMode = "";
        isProcessing = false;
        
        cameraSection.style.display = "none";
        infoSection.classList.add("full-height");
        scanView.style.display = "none";
        menuSelection.style.display = "flex";
        mainSubtitle.innerText = "Silakan pilih metode absensi siswa di bawah ini untuk memulai.";
    }

    function startCamera() {
        if(!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { 
                fps: 10,
                // MEMBUAT KOTAK PERSEGI SEMPURNA YANG OTOMATIS MENYESUAIKAN TINGGI 20% LAYAR
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    // Ambil nilai terkecil antara tinggi dan lebar layar yang tersedia (pasti tingginya)
                    let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                    // Buat kotak sebesar 90% dari ruang tinggi yang tersedia
                    let size = Math.floor(minEdgeSize * 0.90); 
                    return { width: size, height: size };
                }
            }, 
            (decodedText, decodedResult) => {
                if (isProcessing) return;
                const uid = decodedText.trim().toUpperCase();
                processAttendance(uid);
            },
            (errorMessage) => { }
        ).then(() => {
            statusDiv.innerText = "Kamera Aktif! Arahkan QR Code...";
            statusDiv.style.color = "#4b5563";
        }).catch(err => {
            statusDiv.innerText = "Gagal membuka kamera.";
            logDiv.innerText = err;
            statusDiv.style.color = "#dc2626";
        });
    }

    async function startNfc() {
        if (!("NDEFReader" in window)) {
            statusDiv.innerText = "Browser tidak mendukung NFC.";
            logDiv.innerText = "Pastikan Anda menggunakan Google Chrome Android, koneksi aman (HTTPS), dan NFC menyala di pengaturan HP.";
            statusDiv.style.color = "#dc2626";
            return;
        }
        
        try {
            nfcAbortController = new AbortController();
            const ndef = new NDEFReader();
            
            await ndef.scan({ signal: nfcAbortController.signal });
            
            statusDiv.innerText = "Sensor NFC Aktif! Silakan tempel kartu...";
            statusDiv.style.color = "#16a34a";
            logDiv.innerText = "";

            ndef.addEventListener("reading", ({ serialNumber }) => {
                if (isProcessing || currentMode !== "NFC") return; 
                const uid = serialNumber.replace(/:/g, "").toUpperCase();
                processAttendance(uid);
            });
            
        } catch (error) {
            statusDiv.innerText = "NFC Gagal diaktifkan!";
            logDiv.innerText = "Penyebab: " + error.name + " - " + error.message; 
            statusDiv.style.color = "#dc2626";
            console.error(error);
        }
    }

    async function processAttendance(uid) {
        if (isProcessing) return; 
        isProcessing = true; 
        
        statusDiv.innerText = "Memproses ID: " + uid + " ...";
        statusDiv.style.color = "#2563eb"; 
        logDiv.innerText = "";
        
        if (profileContainer.style.display === "block") {
            profileContainer.style.opacity = "0.5";
        }

        try {
            const response = await fetch(`${APPS_SCRIPT_URL}?uid=${uid}`);
            const data = await response.json();
            
            profileContainer.style.opacity = "1";
            
            if (data.status === "success" || data.status === "already") {
                studentName.innerText = data.nama;
                studentKelas.innerText = data.kelas;
                
                if (data.foto && data.foto.trim() !== "") {
                    studentPhoto.src = "foto/" + data.foto;
                } else {
                    studentPhoto.src = "https://via.placeholder.com/150x180?text=Tanpa+Foto"; 
                }
                studentPhoto.onerror = function() { this.src = "https://via.placeholder.com/150x180?text=Foto+Kosong"; };
                
                profileContainer.style.display = "block";

                if (data.status === "success") {
                    attendanceStatusText.style.display = "none"; 
                    statusDiv.innerText = "Sukses: " + data.message;
                    statusDiv.style.color = "#16a34a"; 
                    profileContainer.style.backgroundColor = "#f0fdf4";
                    profileContainer.style.borderColor = "#bbf7d0";
                } else {
                    attendanceStatusText.innerText = data.statusAbsen; 
                    attendanceStatusText.style.display = "block"; 
                    
                    let statusCek = data.statusAbsen.toUpperCase();
                    if (statusCek.includes("MASUK")) { attendanceStatusText.style.color = "#16a34a"; } 
                    else if (statusCek.includes("TERLAMBAT")) { attendanceStatusText.style.color = "#dc2626"; } 
                    else { attendanceStatusText.style.color = "#2563eb"; }
                    
                    statusDiv.innerText = "Info: " + data.message;
                    statusDiv.style.color = "#d97706";
                    profileContainer.style.backgroundColor = "#fffbeb"; 
                    profileContainer.style.borderColor = "#fef3c7";
                }
            } else {
                statusDiv.innerText = "Ditolak: " + data.message;
                statusDiv.style.color = "#dc2626"; 
                attendanceStatusText.innerText = "DITOLAK";
                attendanceStatusText.style.display = "block";
                attendanceStatusText.style.color = "#dc2626"; 
                studentName.innerText = "KARTU/QR TIDAK TERDAFTAR";
                studentKelas.innerText = "-";
                studentPhoto.src = "https://via.placeholder.com/150x180?text=Error";
                profileContainer.style.display = "block";
                profileContainer.style.backgroundColor = "#fef2f2";
                profileContainer.style.borderColor = "#fecaca";
            }
        } catch (err) {
            profileContainer.style.opacity = "1";
            statusDiv.innerText = "Koneksi Terputus / Server Sibuk.";
            statusDiv.style.color = "#dc2626";
            logDiv.innerText = "Error: " + err.message;
        }

        setTimeout(() => {
            if (currentMode === "QR") {
                statusDiv.innerText = "Kamera Aktif! Menunggu QR Code berikutnya...";
                statusDiv.style.color = "#4b5563";
            } else if (currentMode === "NFC") {
                statusDiv.innerText = "Sensor NFC Aktif! Menunggu kartu berikutnya...";
                statusDiv.style.color = "#16a34a";
            }
            isProcessing = false; 
        }, 3000);
    }
</script>

</body>
</html>

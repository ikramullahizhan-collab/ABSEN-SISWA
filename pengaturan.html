<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Admin Absensi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f3f4f6;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: left;
            margin-bottom: 20px;
        }
        h2 { text-align: center; margin-bottom: 15px; color: #111827; font-size: 24px; }
        
        /* --------------------------------------------------- */
        /* DESAIN MENU TAB */
        /* --------------------------------------------------- */
        .tab-menu {
            display: flex;
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: bold;
            color: #9ca3af;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab-btn:hover { color: #10b981; }
        .tab-btn.active {
            color: #10b981;
            border-bottom: 3px solid #10b981;
        }
        .tab-content { 
            display: none; 
            animation: fadeIn 0.4s; 
        }
        
        /* Form & Input Styles */
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #4b5563; font-size: 14px;}
        input[type="time"], input[type="date"], input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f9fafb;
        }
        input:focus { border-color: #10b981; outline: none; }
        
        /* Toggle Switch */
        .toggle-wrapper {
            display: block; position: relative; background: #f9fafb;
            padding: 15px; border: 2px solid #e5e7eb; border-radius: 10px; margin-top: 5px;
        }
        .toggle-header { display: block; float: left; width: 70%; }
        .toggle-status { font-weight: bold; font-size: 14px; display: block; margin-top: 2px; }
        .switch { position: relative; display: block; float: right; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(26px); }
        .clearfix::after { content: ""; clear: both; display: table; }

        /* Buttons */
        .btn-submit {
            padding: 14px; font-size: 16px; font-weight: bold; color: white;
            background-color: #10b981; border: none; border-radius: 8px;
            cursor: pointer; width: 100%; transition: background 0.3s; margin-top: 5px;
        }
        .btn-submit:hover { background-color: #059669; }
        .btn-blue { background-color: #3b82f6; }
        .btn-blue:hover { background-color: #2563eb; }
        
        .btn-back {
            display: block; text-align: center; margin-top: 25px;
            text-decoration: none; color: #6b7280; font-size: 14px; font-weight: bold;
        }
        .btn-back:hover { color: #111827; }
        
        /* Tabel Libur */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #e5e7eb; text-align: left; }
        th { background-color: #f3f4f6; color: #374151; font-weight: bold; }
        
        .message-box {
            margin-top: 15px; padding: 12px; border-radius: 8px;
            display: none; text-align: center; font-weight: bold; font-size: 14px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ Panel Admin</h2>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab(event, 'tabAbsen')">Jam Absen</button>
        <button class="tab-btn" onclick="openTab(event, 'tabLibur')">Hari Libur</button>
    </div>

    <div id="tabAbsen" class="tab-content" style="display: block;">
        <form id="configForm">
            <div class="form-group">
                <label>Batas Jam Masuk Sekolah:</label>
                <input type="time" id="jamMasuk" required>
            </div>
            
            <div class="form-group">
                <label>Jam Pulang Sekolah:</label>
                <input type="time" id="jamPulang" required>
            </div>

            <div class="form-group">
                <label>Jadwal Libur Akhir Pekan:</label>
                <div class="toggle-wrapper clearfix">
                    <div class="toggle-header">
                        <span style="font-size: 15px; font-weight: 500;">Sabtu & Minggu</span>
                        <span id="toggleText" class="toggle-status" style="color: #10b981;">AKTIF (Libur)</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="liburWeekendToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">Simpan Pengaturan</button>
        </form>
        <div id="msgConfig" class="message-box"></div>
    </div>

    <div id="tabLibur" class="tab-content">
        <form id="liburForm">
            <div class="form-group">
                <label>Pilih Tanggal Merah:</label>
                <input type="date" id="tglLibur" required>
            </div>
            
            <div class="form-group">
                <label>Keterangan Libur:</label>
                <input type="text" id="ketLibur" placeholder="Contoh: Maulid Nabi / Rapat Guru" required>
            </div>
            
            <button type="submit" class="btn-submit btn-blue">+ Tambah Libur</button>
        </form>
        <div id="msgLibur" class="message-box"></div>

        <h3 style="color: #1f2937; margin-top: 30px; font-size: 16px; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px;">Daftar Hari Libur Terdaftar</h3>
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Keterangan</th>
                </tr>
            </thead>
            <tbody id="tabelLibur">
                <tr><td colspan="2" style="text-align:center;">Memuat data...</td></tr>
            </tbody>
        </table>
        <small style="color: #9ca3af; display: block; margin-top: 10px; font-style: italic;">*Untuk menghapus libur, silakan hapus barisnya langsung melalui Google Sheets Anda.</small>
    </div>
    
    <a href="index.html" class="btn-back">⬅️ KEMBALI KE MESIN ABSENSI</a>
</div>

<script>
    // FUNGSI UNTUK MENGGANTI TAB
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        // Sembunyikan semua konten tab
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }
        // Hapus class 'active' dari semua tombol
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        // Tampilkan tab yang dipilih dan tambahkan warna hijau (active)
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // VARIABEL FORM & DATA
    const configForm = document.getElementById("configForm");
    const liburForm = document.getElementById("liburForm");
    const toggleInput = document.getElementById("liburWeekendToggle");
    const toggleText = document.getElementById("toggleText");
    const tabelLibur = document.getElementById("tabelLibur");
    
    // GANTI DENGAN URL WEB APP ANDA
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2DsW6Kk7H2bWTLJSs8e2p_1USfv6T_DWT2NfBUy7KKVHSPv1TnqoWcW4Su-Jh7qE6mw/exec";

    // Efek Teks Sakelar Akhir Pekan
    toggleInput.addEventListener("change", function() {
        if (this.checked) {
            toggleText.innerText = "AKTIF (Sistem Libur)";
            toggleText.style.color = "#10b981";
        } else {
            toggleText.innerText = "NONAKTIF (Tetap Masuk)";
            toggleText.style.color = "#6b7280";
        }
    });

    // 1. Muat Data Pengaturan & Tabel Libur dari Sheets
    async function fetchData() {
        try {
            // Ambil Config Jam & Toggle
            const resConfig = await fetch(`${APPS_SCRIPT_URL}?action=get_config`);
            const dataConfig = await resConfig.json();
            if (dataConfig.status === "success" && dataConfig.config) {
                if (dataConfig.config.JAM_MASUK) document.getElementById("jamMasuk").value = dataConfig.config.JAM_MASUK;
                if (dataConfig.config.JAM_PULANG) document.getElementById("jamPulang").value = dataConfig.config.JAM_PULANG;
                
                if (dataConfig.config.LIBUR_AKHIR_PEKAN === "YA") {
                    toggleInput.checked = true;
                    toggleText.innerText = "AKTIF (Sistem Libur)";
                    toggleText.style.color = "#10b981";
                } else {
                    toggleInput.checked = false;
                    toggleText.innerText = "NONAKTIF (Tetap Masuk)";
                    toggleText.style.color = "#6b7280";
                }
            }

            // Ambil Daftar Hari Libur
            const resLibur = await fetch(`${APPS_SCRIPT_URL}?action=get_libur`);
            const dataLibur = await resLibur.json();
            
            tabelLibur.innerHTML = ""; 
            if (dataLibur.status === "success" && dataLibur.data.length > 0) {
                dataLibur.data.forEach(item => {
                    tabelLibur.innerHTML += `<tr>
                        <td style="font-weight:bold; color:#1f2937;">${item.tanggal}</td>
                        <td style="color:#4b5563;">${item.keterangan}</td>
                    </tr>`;
                });
            } else {
                tabelLibur.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#9ca3af; padding: 20px;">Belum ada hari libur terdaftar</td></tr>`;
            }

        } catch (error) {
            console.error("Gagal memuat data:", error);
        }
    }

    // 2. Simpan Pengaturan Dasar (TAB 1)
    configForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.getElementById("msgConfig");
        showMessage(msg, "Sedang menyimpan...", "blue");
        
        const payload = {
            action: "save_config",
            jam_masuk: document.getElementById("jamMasuk").value,
            jam_pulang: document.getElementById("jamPulang").value,
            libur_akhir_pekan: toggleInput.checked ? "YA" : "TIDAK"
        };
        
        try {
            await fetch(APPS_SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });
            showMessage(msg, "Pengaturan berhasil disimpan!", "green");
        } catch (err) {
            showMessage(msg, "Gagal menyimpan data.", "red");
        }
    });

    // 3. Tambah Hari Libur Baru (TAB 2)
    liburForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.getElementById("msgLibur");
        const tgl = document.getElementById("tglLibur").value;
        const ket = document.getElementById("ketLibur").value;
        
        showMessage(msg, "Menambahkan ke kalender...", "blue");
        
        const payload = {
            action: "add_libur",
            tanggal: tgl,
            keterangan: ket
        };
        
        try {
            await fetch(APPS_SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });
            
            showMessage(msg, "Berhasil! Kalender diperbarui.", "green");
            document.getElementById("tglLibur").value = "";
            document.getElementById("ketLibur").value = "";
            
            // Render ulang tabel (Tunggu 2 detik agar Sheet Google selesai memproses)
            setTimeout(fetchData, 2000);
            
        } catch (err) {
            showMessage(msg, "Gagal menambahkan libur.", "red");
        }
    });

    // Fungsi notifikasi pop-up
    function showMessage(element, text, colorType) {
        element.style.display = "block";
        element.innerText = text;
        if(colorType === "blue") { element.style.backgroundColor = "#e0f2fe"; element.style.color = "#0369a1"; }
        if(colorType === "green") { element.style.backgroundColor = "#dcfce7"; element.style.color = "#15803d"; }
        if(colorType === "red") { element.style.backgroundColor = "#fee2e2"; element.style.color = "#b91c1c"; }
        setTimeout(() => { element.style.display = "none"; }, 4000);
    }

    // Muat data saat halaman terbuka
    fetchData();
</script>

</body>
</html>
